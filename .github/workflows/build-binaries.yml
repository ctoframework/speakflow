name: Build Binaries

on:
  push:
    branches:
      - main
    tags:
      - "*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: speakflow-linux
            binary_path: target/release/speakflow
          - os: windows-latest
            artifact_name: speakflow-windows
            binary_path: target/release/speakflow.exe
          - os: macos-latest
            artifact_name: speakflow-macos
            binary_path: target/release/speakflow

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux build deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libgtk-3-dev \
            libwayland-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-0 \
            pkg-config

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --locked

      - name: Stage binary
        shell: bash
        run: |
          mkdir -p dist
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cp "${{ matrix.binary_path }}" "dist/${{ matrix.artifact_name }}.exe"
          else
            cp "${{ matrix.binary_path }}" "dist/${{ matrix.artifact_name }}"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/
          if-no-files-found: error

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build release notes
        shell: bash
        run: |
          set -euo pipefail

          current_tag=${GITHUB_REF_NAME}
          previous_tag=$(git describe --tags --abbrev=0 "${GITHUB_SHA}^" 2>/dev/null || true)

          if [ -n "${previous_tag}" ]; then
            range="${previous_tag}..${current_tag}"
            header="Changes since ${previous_tag}"
          else
            range="${current_tag}"
            header="All commits in this release"
          fi

          {
            printf "%s\n\n" "${header}"
            git log --reverse --pretty=format:"- %s (%h)" "${range}"
          } > release-notes.md

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: release-notes.md
          files: dist/*
